name: CI & Docker Publish

on:
  push:
    branches: [main, dev, ts-buffered-proxy]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-docker-${{ github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Docker image for integration tests
        run: docker build -t tube-ci-test:${{ github.sha }} .

      - name: Start app container
        run: |
          docker run -d --name tube-ci -p 8888:8888 tube-ci-test:${{ github.sha }}

      - name: Wait for healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8888/health >/dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            sleep 2
          done
          echo "Healthcheck timeout"
          docker logs tube-ci || true
          exit 1

      - name: Run integration tests
        run: APP_URL=http://127.0.0.1:8888 npm run test:integration

      - name: Stop app container
        if: always()
        run: docker rm -f tube-ci || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/tube"
          TAGS=""

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${IMAGE_BASE}:latest"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            TAGS="${IMAGE_BASE}:dev"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/ts-buffered-proxy" ]; then
            TAGS="${IMAGE_BASE}:ts-buffered-proxy"
          fi

          if [ -z "${TAGS}" ]; then
            echo "No image tag configured for ref ${GITHUB_REF}" >&2
            exit 1
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
